apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: eventsphere
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: eventsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: postgres-password
        - name: POSTGRES_MULTIPLE_DATABASES
          value: "identity_db,catalog_db,seating_db,order_db,payment_db,ticket_db,notification_db"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d/init-db.sh
          subPath: init-db.sh
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: init-script
        configMap:
          name: postgres-init-config
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: eventsphere
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  namespace: eventsphere
data:
  init-db.sh: |
    #!/bin/bash
    set -e
    if [ -n "$POSTGRES_MULTIPLE_DATABASES" ]; then
      for db in $(echo $POSTGRES_MULTIPLE_DATABASES | tr ',' ' '); do
        psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" <<-EOSQL
          CREATE DATABASE $db;
        EOSQL
      done
    fi
