apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: eventsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: eventsphere/order-service:latest
        ports:
        - containerPort: 8085
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: order-db-url
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: SEATING_SERVICE_URL
          value: "http://seating-service:8083"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8084"
        - name: SERVICE_NAME
          value: "order-service"
        livenessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: eventsphere
spec:
  selector:
    app: order-service
  ports:
  - protocol: TCP
    port: 8085
    targetPort: 8085
  type: ClusterIP
