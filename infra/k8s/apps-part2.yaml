# --- Payment Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: eventsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8084"
    spec:
      containers:
      - name: payment-service
        image: eventsphere/payment-service:latest
        ports:
        - containerPort: 8084
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: payment-db-url
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: eventsphere-config
              key: KAFKA_BROKERS
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8084
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8084
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: eventsphere
spec:
  selector:
    app: payment-service
  ports:
  - port: 8084
---
