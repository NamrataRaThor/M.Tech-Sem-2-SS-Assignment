# --- API Gateway ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: eventsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: api-gateway
        image: eventsphere/api-gateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: jwt-secret
        - name: AUTH_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eventsphere-config
              key: AUTH_SERVICE_URL
        - name: CATALOG_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eventsphere-config
              key: CATALOG_SERVICE_URL
        - name: SEATING_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eventsphere-config
              key: SEATING_SERVICE_URL
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eventsphere-config
              key: ORDER_SERVICE_URL
        - name: PAYMENT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eventsphere-config
              key: PAYMENT_SERVICE_URL
        - name: TICKET_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eventsphere-config
              key: TICKET_SERVICE_URL
        - name: NOTIFICATION_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: eventsphere-config
              key: NOTIFICATION_SERVICE_URL
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: eventsphere
spec:
  selector:
    app: api-gateway
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
