apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eventsphere-ingress
  namespace: eventsphere
spec:
  rules:
  - host: eventsphere.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80
