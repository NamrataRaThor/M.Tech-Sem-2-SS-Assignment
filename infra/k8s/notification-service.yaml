apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: eventsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: eventsphere/notification-service:latest
        ports:
        - containerPort: 8087
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: notification-db-url
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: SERVICE_NAME
          value: "notification-service"
        livenessProbe:
          httpGet:
            path: /health
            port: 8087
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8087
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: eventsphere
spec:
  selector:
    app: notification-service
  ports:
  - protocol: TCP
    port: 8087
    targetPort: 8087
  type: ClusterIP
