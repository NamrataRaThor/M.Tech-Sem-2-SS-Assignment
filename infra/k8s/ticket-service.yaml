apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-service
  namespace: eventsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ticket-service
  template:
    metadata:
      labels:
        app: ticket-service
    spec:
      containers:
      - name: ticket-service
        image: eventsphere/ticket-service:latest
        ports:
        - containerPort: 8086
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: ticket-db-url
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: SERVICE_NAME
          value: "ticket-service"
        livenessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 8086
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-service
  namespace: eventsphere
spec:
  selector:
    app: ticket-service
  ports:
  - protocol: TCP
    port: 8086
    targetPort: 8086
  type: ClusterIP
