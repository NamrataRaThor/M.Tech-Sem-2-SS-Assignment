apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: eventsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: eventsphere/api-gateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: jwt-secret
        - name: AUTH_SERVICE_URL
          value: "http://identity-service:8081"
        - name: CATALOG_SERVICE_URL
          value: "http://catalog-service:8082"
        - name: SEATING_SERVICE_URL
          value: "http://seating-service:8083"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:8085"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8084"
        - name: TICKET_SERVICE_URL
          value: "http://ticket-service:8086"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:8087"
        - name: SERVICE_NAME
          value: "api-gateway"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: eventsphere
spec:
  selector:
    app: api-gateway
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: LoadBalancer
