# --- Identity Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: eventsphere
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8081"
    spec:
      containers:
      - name: identity-service
        image: eventsphere/identity-service:latest
        ports:
        - containerPort: 8081
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: identity-db-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: eventsphere-secrets
              key: jwt-secret
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: eventsphere
spec:
  selector:
    app: identity-service
  ports:
  - port: 8081
---
