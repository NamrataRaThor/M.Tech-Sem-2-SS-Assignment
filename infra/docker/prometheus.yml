global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'identity-service'
    static_configs:
      - targets: ['identity-service:8081']

  - job_name: 'catalog-service'
    static_configs:
      - targets: ['catalog-service:8082']

  - job_name: 'seating-service'
    static_configs:
      - targets: ['seating-service:8083']

  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8084']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8085']

  - job_name: 'ticket-service'
    static_configs:
      - targets: ['ticket-service:8086']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8087']
