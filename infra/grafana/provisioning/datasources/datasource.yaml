apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        - datasourceUid: Tempo # Assuming Tempo or Loki-internal tracing
          matcherRegex: "traceId=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"
