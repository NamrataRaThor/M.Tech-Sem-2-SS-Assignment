version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:15-alpine
    container_name: eventsphere-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: identity_db,catalog_db,seating_db,order_db,payment_db,ticket_db,notification_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: eventsphere-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: eventsphere-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: eventsphere-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # --- Observability ---
  prometheus:
    image: prom/prometheus:latest
    container_name: eventsphere-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: eventsphere-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning

  loki:
    image: grafana/loki:latest
    container_name: eventsphere-loki
    volumes:
      - loki_data:/loki
      - ./infra/loki/loki-config.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  # --- Microservices ---
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - PORT=8080
      - JWT_SECRET=super-secret-key
      - AUTH_SERVICE_URL=http://identity-service:8081
      - CATALOG_SERVICE_URL=http://catalog-service:8082
      - SEATING_SERVICE_URL=http://seating-service:8083
      - ORDER_SERVICE_URL=http://order-service:8085
      - PAYMENT_SERVICE_URL=http://payment-service:8084
      - TICKET_SERVICE_URL=http://ticket-service:8086
      - NOTIFICATION_SERVICE_URL=http://notification-service:8087
    depends_on:
      identity-service:
        condition: service_healthy

  identity-service:
    build:
      context: .
      dockerfile: apps/identity-service/Dockerfile
    container_name: identity-service
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/identity_db
      - JWT_SECRET=super-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: .
      dockerfile: apps/catalog-service/Dockerfile
    container_name: catalog-service
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/catalog_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  seating-service:
    build:
      context: .
      dockerfile: apps/seating-service/Dockerfile
    container_name: seating-service
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/seating_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build:
      context: .
      dockerfile: apps/order-service/Dockerfile
    container_name: order-service
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/order_db
      - KAFKA_BROKERS=kafka:9092
      - SEATING_SERVICE_URL=http://seating-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: apps/payment-service/Dockerfile
    container_name: payment-service
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/payment_db
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ticket-service:
    build:
      context: .
      dockerfile: apps/ticket-service/Dockerfile
    container_name: ticket-service
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/ticket_db
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: notification-service
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres:5432/notification_db
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8087/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  default:
    name: eventsphere-network

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  kafka_data:
  loki_data:
